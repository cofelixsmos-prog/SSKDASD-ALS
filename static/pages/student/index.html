<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarly — Student Dashboard</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sb-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
      <h1>Scholarly</h1>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Student</div>
        <button class="nav-item active">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>Dashboard
        </button>
        <button class="nav-item" onclick="location.href='/static/pages/student/attendance.html'">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>Attendance
        </button>
        <button class="nav-item" onclick="location.href='/static/pages/student/quizzes.html'">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>Quizzes
        </button>
      </div>
    </nav>
  </aside>

  <header class="topbar">
    <div class="topbar-left">
      <button class="btn btn-icon btn-secondary" id="sidebar-toggle" style="display:none">☰</button>
      <h2>Dashboard</h2>
    </div>
    <div class="topbar-right">
      <span class="theme-label">☀️</span><button class="theme-toggle" id="theme-toggle"></button><span class="theme-label">🌙</span>
      <div style="position:relative">
        <button class="profile-trigger" id="profile-trigger">
          <div class="profile-avatar" id="topbar-avatar">ST</div>
          <span class="profile-name" id="topbar-name">Student</span>
          <span style="font-size:.6rem">▼</span>
        </button>
        <div class="profile-dropdown hidden" id="profile-dropdown">
          <div class="dd-header"><div class="dd-name" id="dd-name"></div><div class="dd-class">Student</div></div>
          <button class="dd-item" id="dd-theme-btn">🎨 Toggle Theme</button>
          <button class="dd-item danger" id="dd-logout-btn">🚪 Log Out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main">

    <!-- Low attendance warning -->
    <div class="hidden" id="warning-banner" style="background:var(--danger-bg);border:2px solid rgba(255,75,75,.25);border-radius:14px;padding:.85rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;font-size:.88rem;font-weight:700;color:var(--danger)">
      ⚠️ Your attendance is below 75%. Please attend classes regularly.
    </div>

    <div class="stats-grid">
      <div class="stat-card" style="cursor:pointer" onclick="location.href='/static/pages/student/attendance.html'">
        <div class="stat-label">Attendance</div>
        <div class="stat-value" id="stat-att">—%</div>
        <div class="stat-sub">Overall rate</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Classes Attended</div>
        <div class="stat-value" id="stat-present">—</div>
        <div class="stat-sub">Out of <span id="stat-total">—</span> total</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Absences</div>
        <div class="stat-value" id="stat-absent" style="color:var(--danger)">—</div>
        <div class="stat-sub">Total absent days</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">Join a Quiz</div></div>
      <div style="display:flex;gap:.75rem;align-items:center">
        <input type="text" id="quiz-code" placeholder="Enter 6-char code" maxlength="6"
          style="flex:1;padding:.75rem 1rem;border:2.5px solid var(--input-border);border-radius:14px;font-size:1.1rem;font-weight:800;font-family:inherit;background:var(--bg);color:var(--text);outline:none;text-transform:uppercase;letter-spacing:3px;text-align:center">
        <button class="btn btn-primary" id="join-btn">Join</button>
      </div>
      <div id="join-error" class="hidden" style="margin-top:.5rem;font-size:.82rem;font-weight:700;color:var(--danger)"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Recent Attendance</div>
        <button class="btn btn-secondary btn-sm" onclick="location.href='/static/pages/student/attendance.html'">View All</button>
      </div>
      <div id="recent-records"><div class="loading">Loading…</div></div>
    </div>

  </main>

  <script type="module">
    import { getToken, getUser, logout } from '/static/js/auth.js';
    import { requireAuth } from '/static/js/guard.js';
    requireAuth(['student']);

    const token = getToken();
    const user = getUser();

    const html = document.documentElement;
    html.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    const toggleTheme = () => { const n = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; html.setAttribute('data-theme', n); localStorage.setItem('theme', n); };
    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    document.getElementById('dd-theme-btn').addEventListener('click', toggleTheme);
    document.getElementById('dd-logout-btn').addEventListener('click', logout);
    if (user) {
      document.getElementById('topbar-name').textContent = user.name;
      document.getElementById('dd-name').textContent = user.name;
      document.getElementById('topbar-avatar').textContent = user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    }
    document.getElementById('profile-trigger').addEventListener('click', () => document.getElementById('profile-dropdown').classList.toggle('hidden'));
    document.addEventListener('click', e => { if (!e.target.closest('#profile-trigger')) document.getElementById('profile-dropdown').classList.add('hidden'); });
    const st = document.getElementById('sidebar-toggle');
    if (window.innerWidth <= 768) st.style.display = 'flex';
    st.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

    document.getElementById('quiz-code').addEventListener('input', e => e.target.value = e.target.value.toUpperCase());
    document.getElementById('join-btn').addEventListener('click', () => {
      const code = document.getElementById('quiz-code').value.trim();
      if (!code || code.length !== 6) { document.getElementById('join-error').textContent = 'Enter a valid 6-character code'; document.getElementById('join-error').classList.remove('hidden'); return; }
      location.href = `/static/pages/student/quiz-take.html?code=${code}`;
    });

    async function load() {
      try {
        const res = await fetch('/api/attendance/student/me', { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) return;
        const data = await res.json();
        const s = data.summary;

        const pctEl = document.getElementById('stat-att');
        pctEl.textContent = s.percentage + '%';
        pctEl.style.color = s.percentage < 75 ? 'var(--danger)' : s.percentage >= 90 ? 'var(--success)' : 'var(--primary)';
        document.getElementById('stat-present').textContent = s.present;
        document.getElementById('stat-total').textContent = s.total;
        document.getElementById('stat-absent').textContent = s.absent;

        if (s.percentage < 75 && s.total > 0) {
          document.getElementById('warning-banner').classList.remove('hidden');
          document.getElementById('warning-banner').style.display = 'flex';
        }

        const list = document.getElementById('recent-records');
        if (!data.records.length) {
          list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No attendance recorded yet</div></div>';
          return;
        }
        list.innerHTML = data.records.slice(0, 7).map(r => `
          <div style="display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1.5px solid var(--border)">
            <div style="flex:1;font-size:.88rem;font-weight:700">${new Date(r.date+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'})}</div>
            <span class="badge ${r.status==='present'?'badge-green':r.status==='absent'?'badge-red':'badge-yellow'}">${r.status}</span>
          </div>`).join('');
      } catch {}
    }

    load();
  </script>
</body>
</html>
