<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarly — My Quizzes</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sb-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
      <h1>Scholarly</h1>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Student</div>
        <button class="nav-item" onclick="location.href='/static/pages/student/index.html'">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>Dashboard
        </button>
        <button class="nav-item" onclick="location.href='/static/pages/student/attendance.html'">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>Attendance
        </button>
        <button class="nav-item active">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>Quizzes
        </button>
      </div>
    </nav>
  </aside>

  <header class="topbar">
    <div class="topbar-left">
      <button class="btn btn-icon btn-secondary" id="sidebar-toggle" style="display:none">☰</button>
      <h2>My Quizzes</h2>
    </div>
    <div class="topbar-right">
      <span class="theme-label">☀️</span><button class="theme-toggle" id="theme-toggle"></button><span class="theme-label">🌙</span>
      <div style="position:relative">
        <button class="profile-trigger" id="profile-trigger">
          <div class="profile-avatar" id="topbar-avatar">ST</div>
          <span class="profile-name" id="topbar-name">Student</span>
          <span style="font-size:.6rem">▼</span>
        </button>
        <div class="profile-dropdown hidden" id="profile-dropdown">
          <div class="dd-header"><div class="dd-name" id="dd-name"></div><div class="dd-class">Student</div></div>
          <button class="dd-item" id="dd-theme-btn">🎨 Toggle Theme</button>
          <button class="dd-item danger" id="dd-logout-btn">🚪 Log Out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main">
    <!-- Join quiz card -->
    <div class="card" style="padding:1.1rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
      <div style="font-size:.88rem;font-weight:800;flex-shrink:0">Join a Quiz</div>
      <input type="text" id="join-code" placeholder="Enter 6-character code…" maxlength="6" style="flex:1;min-width:160px;padding:.6rem .9rem;border:2.5px solid var(--input-border);border-radius:10px;font-family:inherit;font-size:.9rem;font-weight:800;letter-spacing:.15rem;text-transform:uppercase;background:var(--bg);color:var(--text);outline:none;max-width:200px">
      <button class="btn btn-primary" id="join-btn">▶ Join Quiz</button>
    </div>

    <!-- Submission history -->
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:.85rem 1.2rem;border-bottom:2px solid var(--border)">
        <div style="font-size:.85rem;font-weight:800">Quiz History</div>
      </div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr><th>Subject</th><th>Quiz Title</th><th>Date</th><th>Score</th><th>Percentage</th><th>Actions</th></tr>
          </thead>
          <tbody id="quiz-tbody"><tr><td colspan="6" class="loading">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script type="module">
    import { getToken, getUser, logout } from '/static/js/auth.js';
    import { requireAuth } from '/static/js/guard.js';
    requireAuth(['student']);

    const token = getToken();
    const user = getUser();

    const html = document.documentElement;
    html.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    const toggleTheme = () => { const n = html.getAttribute('data-theme')==='dark'?'light':'dark'; html.setAttribute('data-theme',n); localStorage.setItem('theme',n); };
    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    document.getElementById('dd-theme-btn').addEventListener('click', toggleTheme);
    document.getElementById('dd-logout-btn').addEventListener('click', logout);
    if (user) {
      document.getElementById('topbar-name').textContent = user.name;
      document.getElementById('dd-name').textContent = user.name;
      document.getElementById('topbar-avatar').textContent = user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    }
    document.getElementById('profile-trigger').addEventListener('click', () => document.getElementById('profile-dropdown').classList.toggle('hidden'));
    document.addEventListener('click', e => { if (!e.target.closest('#profile-trigger')) document.getElementById('profile-dropdown').classList.add('hidden'); });
    const st = document.getElementById('sidebar-toggle');
    if (window.innerWidth <= 768) st.style.display = 'flex';
    st.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

    function toast(msg, type='success') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
      c.appendChild(t); setTimeout(() => t.remove(), 4000);
    }

    async function api(path, opts={}) {
      const res = await fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...opts.headers } });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || 'Failed');
      return data;
    }

    document.getElementById('join-btn').addEventListener('click', async () => {
      const code = document.getElementById('join-code').value.trim().toUpperCase();
      if (code.length !== 6) { toast('Enter a valid 6-character code', 'error'); return; }
      try {
        const info = await api(`/api/quizzes/join/${code}`);
        location.href = `/static/pages/student/quiz-take.html?id=${info.quiz_id}`;
      } catch(e) { toast(e.message, 'error'); }
    });
    document.getElementById('join-code').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('join-btn').click(); });

    async function load() {
      const tbody = document.getElementById('quiz-tbody');
      try {
        const subs = await api('/api/student/submissions');
        if (!subs.length) {
          tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">No quizzes taken yet</div><div class="empty-sub">Join a quiz using the code above</div></div></td></tr>';
          return;
        }
        tbody.innerHTML = subs.map(s => {
          const pct = s.total_points ? Math.round((s.score / s.total_points) * 100) : 0;
          const grade = pct >= 90 ? 'badge-green' : pct >= 60 ? 'badge-yellow' : 'badge-red';
          return `<tr>
            <td style="color:var(--text-light)">${s.subject}</td>
            <td><strong>${s.quiz_title}</strong></td>
            <td style="font-size:.82rem;color:var(--text-light)">${new Date(s.submitted_at).toLocaleDateString()}</td>
            <td style="font-weight:800">${s.score} / ${s.total_points}</td>
            <td><span class="badge ${grade}">${pct}%</span></td>
            <td><button class="btn btn-secondary btn-sm" onclick="location.href='/static/pages/student/quiz-review.html?id=${s.id}'">🔍 Review</button></td>
          </tr>`;
        }).join('');
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="6" style="color:var(--danger);text-align:center;padding:1.5rem">${e.message}</td></tr>`;
      }
    }
    load();
  </script>
</body>
</html>
