<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarly — Sign In</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-container">
      <div class="logo">
        <div class="logo-mascot">
          <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </div>
        <h1>Scholarly</h1>
      </div>

      <div class="greeting-big" id="greeting-text"></div>

      <div class="theme-row">
        <span class="theme-label">☀️</span>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
        <span class="theme-label">🌙</span>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>
      <div id="success-msg" class="success-msg hidden"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <input type="email" id="email" name="email" placeholder="Email" required autofocus autocomplete="username">
        </div>
        <div class="form-group">
          <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      </form>

      <div style="margin-top:1.25rem;padding:.75rem;background:var(--surface);border-radius:14px;font-size:.78rem;font-weight:700;color:var(--text-light);text-align:center;">
        Default: <strong style="color:var(--text)">admin@Scholarly.com</strong> / <strong style="color:var(--text)">Admin@1234</strong>
      </div>
    </div>
  </div>

  <script type="module">
    import { saveToken, saveUser, redirectByRole } from '/static/js/auth.js';

    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', saved);
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const h = new Date().getHours();
    const gt = document.getElementById('greeting-text');
    if (h < 12) gt.textContent = 'Good Morning ☀️';
    else if (h < 17) gt.textContent = 'Good Afternoon 🌤️';
    else gt.textContent = 'Good Evening 🌙';

    const form = document.getElementById('login-form');
    const errEl = document.getElementById('error-msg');
    const succEl = document.getElementById('success-msg');
    const btn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      succEl.classList.add('hidden');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.classList.remove('hidden');
        return;
      }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-inline"></span> SIGNING IN…';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed.');
        saveToken(data.access_token);
        saveUser({ id: data.id, name: data.name, role: data.role });
        succEl.textContent = "✓ You're in! Redirecting…";
        succEl.classList.remove('hidden');
        setTimeout(() => redirectByRole(data.role), 800);
      } catch (err) {
        errEl.textContent = err.message || 'Login failed.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
