<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarly — Child's Quiz History</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sb-icon"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
      <h1>Scholarly</h1>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Parent</div>
        <button class="nav-item" onclick="location.href='/static/pages/parent/index.html'">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>Dashboard
        </button>
        <button class="nav-item" onclick="location.href='/static/pages/parent/attendance.html'">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>Attendance
        </button>
        <button class="nav-item active">
          <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>Quizzes
        </button>
      </div>
    </nav>
  </aside>

  <header class="topbar">
    <div class="topbar-left">
      <button class="btn btn-icon btn-secondary" id="sidebar-toggle" style="display:none">☰</button>
      <h2>Child's Quiz History</h2>
    </div>
    <div class="topbar-right">
      <span class="theme-label">☀️</span><button class="theme-toggle" id="theme-toggle"></button><span class="theme-label">🌙</span>
      <div style="position:relative">
        <button class="profile-trigger" id="profile-trigger">
          <div class="profile-avatar" id="topbar-avatar">PR</div>
          <span class="profile-name" id="topbar-name">Parent</span>
          <span style="font-size:.6rem">▼</span>
        </button>
        <div class="profile-dropdown hidden" id="profile-dropdown">
          <div class="dd-header"><div class="dd-name" id="dd-name"></div><div class="dd-class">Parent</div></div>
          <button class="dd-item" id="dd-theme-btn">🎨 Toggle Theme</button>
          <button class="dd-item danger" id="dd-logout-btn">🚪 Log Out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main">
    <div class="card" style="padding:0;overflow:hidden">
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr><th>Subject</th><th>Quiz Title</th><th>Date</th><th>Score</th><th>Grade</th><th>Flags</th></tr>
          </thead>
          <tbody id="quiz-tbody"><tr><td colspan="6" class="loading">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script type="module">
    import { getToken, getUser, logout } from '/static/js/auth.js';
    import { requireAuth } from '/static/js/guard.js';
    requireAuth(['parent']);

    const token = getToken();
    const user = getUser();

    const html = document.documentElement;
    html.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    const toggleTheme = () => { const n = html.getAttribute('data-theme')==='dark'?'light':'dark'; html.setAttribute('data-theme',n); localStorage.setItem('theme',n); };
    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    document.getElementById('dd-theme-btn').addEventListener('click', toggleTheme);
    document.getElementById('dd-logout-btn').addEventListener('click', logout);
    if (user) {
      document.getElementById('topbar-name').textContent = user.name;
      document.getElementById('dd-name').textContent = user.name;
      document.getElementById('topbar-avatar').textContent = user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    }
    document.getElementById('profile-trigger').addEventListener('click', () => document.getElementById('profile-dropdown').classList.toggle('hidden'));
    document.addEventListener('click', e => { if (!e.target.closest('#profile-trigger')) document.getElementById('profile-dropdown').classList.add('hidden'); });
    const st = document.getElementById('sidebar-toggle');
    if (window.innerWidth <= 768) st.style.display = 'flex';
    st.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

    async function load() {
      const tbody = document.getElementById('quiz-tbody');
      try {
        const res = await fetch('/api/parent/quizzes', { headers: { Authorization: `Bearer ${token}` } });
        const subs = await res.json();
        if (!subs.length) {
          tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">No quizzes taken yet</div></div></td></tr>';
          return;
        }
        tbody.innerHTML = subs.map(s => {
          const pct = s.pct;
          const grade = pct >= 90 ? 'badge-green' : pct >= 60 ? 'badge-yellow' : 'badge-red';
          const flags = s.cheat_flag_count > 0 ? `<span class="badge badge-red">⚠ ${s.cheat_flag_count}</span>` : '<span style="color:var(--text-light)">—</span>';
          const violation = s.violation_confirmed ? ' <span class="badge badge-red" title="Violation confirmed by teacher">Violation</span>' : '';
          return `<tr>
            <td style="color:var(--text-light)">${s.subject}</td>
            <td><strong>${s.quiz_title}</strong>${violation}</td>
            <td style="font-size:.82rem;color:var(--text-light)">${new Date(s.submitted_at).toLocaleDateString()}</td>
            <td style="font-weight:800">${s.score} / ${s.total_points}</td>
            <td><span class="badge ${grade}">${pct}%</span></td>
            <td>${flags}</td>
          </tr>`;
        }).join('');
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="6" style="color:var(--danger);text-align:center;padding:1.5rem">${e.message}</td></tr>`;
      }
    }
    load();
  </script>
</body>
</html>
